<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學教材下載專區</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 登入 */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-panel { background: white; border-radius: 20px; padding: 40px; width: 90%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        .login-panel h2 { color: #333; margin-bottom: 30px; font-size: 2em; }
        .login-panel .form-group { margin-bottom: 20px; }
        .login-panel label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        .login-panel input { width: 100%; padding: 15px; border: 3px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; transition: all 0.3s; }
        .login-panel input:focus { outline: none; border-color: #667eea; }
        .login-panel .hint { background: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 20px; color: #856404; font-size: 0.95em; line-height: 1.6; }
        
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; transition: all 0.3s ease; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-success { background: linear-gradient(135deg, #00b894 0%, #00a381 100%); color: white; }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; padding: 30px; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .header h1 { color: white; font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header-info { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px; color: white; }
        
        .notice { background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%); color: white; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .notice .icon { font-size: 2em; }
        
        .grade-section { background: white; border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .grade-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px 30px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .grade-header h3 { font-size: 1.8em; display: flex; align-items: center; gap: 15px; }
        .toggle-icon { font-size: 1.5em; transition: transform 0.4s ease; }
        .grade-header.active .toggle-icon { transform: rotate(180deg); }
        
        .grade-content { padding: 25px; display: none; background: #f8f9fa; }
        .grade-content.active { display: block; }
        
        .category { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .category h4 { color: #667eea; font-size: 1.4em; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 3px solid #667eea; display: flex; align-items: center; gap: 12px; }
        
        .file-list { display: grid; gap: 12px; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: linear-gradient(135deg, #f5f6fa 0%, #dfe6e9 100%); border-radius: 12px; border-left: 5px solid #667eea; transition: all 0.3s; }
        .file-item:hover { transform: translateX(8px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .file-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .file-icon { font-size: 2.5em; }
        .file-name { font-weight: bold; color: #333; font-size: 1.1em; }
        .file-size { color: #999; font-size: 0.9em; }
        .file-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn-download { background: linear-gradient(135deg, #00b894 0%, #00a381 100%); color: white; text-decoration: none; padding: 8px 16px; border-radius: 10px; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; transition: all 0.3s; }
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .empty-message { text-align: center; padding: 40px; color: #999; font-style: italic; font-size: 1.1em; }
        .empty-message .icon { font-size: 3em; margin-bottom: 15px; }
        
        .loading { text-align: center; padding: 40px; color: white; }
        .loading .icon { font-size: 3em; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .status-message { position: fixed; top: 20px; right: 20px; padding: 15px 30px; border-radius: 12px; color: white; font-weight: bold; z-index: 10001; animation: slideIn 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .status-success { background: linear-gradient(135deg, #00b894 0%, #00a381 100%); }
        .status-error { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .file-item { flex-direction: column; gap: 15px; }
            .file-actions { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-panel">
            <h2>🔐 登入系統</h2>
            <div class="form-group">
                <label>請輸入密碼：</label>
                <input type="password" id="loginPassword" placeholder="輸入密碼" onkeypress="if(event.key==='Enter') login()">
            </div>
            <button class="btn btn-primary" onclick="login()" style="width: 100%; justify-content: center;">🚀 登入系統</button>
            <div class="hint">📌 此系統為唯讀版本，僅提供瀏覽與下載功能<br>教材會自動從 materials 資料夾載入</div>
        </div>
    </div>

    <div class="container hidden" id="mainContent">
        <div class="header">
            <h1>📚 數學教材下載專區</h1>
            <div class="header-info">👋 歡迎回來</div>
        </div>
        
        <div class="notice">
            <span class="icon">ℹ️</span>
            <div><strong>使用說明：</strong>此系統為教材下載專區，點擊年級標題可展開區域，點擊「下載」按鈕即可取得 PDF 檔案。新增教材只需將 PDF 放入 materials 資料夾即可。</div>
        </div>
        
        <div class="grade-section">
            <div class="grade-header active" onclick="toggleGrade(this)">
                <h3>📚 載入中...</h3>
                <span class="toggle-icon">▼</span>
            </div>
            <div class="grade-content active" id="loadingContent">
                <div class="loading">
                    <div class="icon">⏳</div>
                    <p>正在載入教材資料...</p>
                </div>
            </div>
        </div>
        
        <div id="gradesContainer"></div>
    </div>
    
    <div id="statusContainer"></div>

    <script>
        const DEFAULT_PASSWORD = '123456';
        let isLoggedIn = false;
        
        const categoryIcons = {
            '會考區': '🎯', '模擬考區': '📝', '月考區': '📅',
            '學習區': '📚', '學測區': '🎓', '繁星區': '⭐'
        };
        
        const defaultCategories = {
            '國一': ['學習區', '月考區'],
            '國二': ['學習區', '月考區'],
            '國三': ['會考區', '模擬考區', '月考區', '學習區'],
            '高一': ['學習區', '月考區', '學測區'],
            '高二': ['學習區', '月考區', '學測區'],
            '高三': ['學習區', '學測區', '繁星區']
        };

        function login() {
            const inputPassword = document.getElementById('loginPassword').value;
            if (inputPassword === DEFAULT_PASSWORD) {
                isLoggedIn = true;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                loadMaterials();
            } else {
                showStatus('密碼錯誤，請重新輸入', 'error');
                document.getElementById('loginPassword').value = '';
            }
        }

        async function loadMaterials() {
            const container = document.getElementById('gradesContainer');
            container.innerHTML = '';
            
            try {
                // 使用 fetch API 取得目錄結構
                const response = await fetch('materials/');
                const html = await response.text();
                
                // 解析 HTML 目錄
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');
                
                const grades = {};
                
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    const text = link.textContent.trim();
                    
                    // 檢查是否為年級資料夾
                    if (text.endsWith('/') && !text.includes('.')) {
                        const gradeName = text.replace('/', '');
                        if (['國一', '國二', '國三', '高一', '高二', '高三'].includes(gradeName)) {
                            grades[gradeName] = {};
                        }
                    }
                });
                
                // 為每個年級建立區域結構
                Object.keys(grades).forEach(grade => {
                    grades[grade] = {};
                    (defaultCategories[grade] || []).forEach(cat => {
                        grades[grade][cat] = [];
                    });
                });
                
                // 如果沒有找到年級，顯示提示
                if (Object.keys(grades).length === 0) {
                    document.getElementById('loadingContent').innerHTML = `
                        <div class="empty-message">
                            <div class="icon">📁</div>
                            <p>找不到教材資料夾</p>
                            <p style="font-size: 0.9em; margin-top: 10px;">請確保 materials 資料夾存在且包含年級子資料夾</p>
                        </div>
                    `;
                    return;
                }
                
                // 隱藏載入中區塊，顯示解析後的內容
                document.querySelector('.grade-section').style.display = 'none';
                
                // 渲染所有年級
                Object.keys(grades).sort((a, b) => {
                    const order = ['國一', '國二', '國三', '高一', '高二', '高三'];
                    return order.indexOf(a) - order.indexOf(b);
                }).forEach(grade => {
                    renderGradeSection(grade, grades[grade]);
                });
                
            } catch (error) {
                console.error('載入失敗：', error);
                document.getElementById('loadingContent').innerHTML = `
                    <div class="empty-message">
                        <div class="icon">❌</div>
                        <p>載入失敗</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        async function renderGradeSection(grade, categories) {
            const container = document.getElementById('gradesContainer');
            const gradeIndex = ['國一', '國二', '國三', '高一', '高二', '高三'].indexOf(grade);
            const icons = ['📘', '📗', '📙', '📗', '📙', '📕'];
            let categoriesHTML = '';
            
            for (const [category, files] of Object.entries(categories)) {
                const catIcon = categoryIcons[category] || '📁';
                const categoryFiles = await scanCategory(grade, category);
                let filesHTML = '';
                
                if (categoryFiles.length > 0) {
                    filesHTML = categoryFiles.map(file => `
                        <div class="file-item">
                            <div class="file-info">
                                <span class="file-icon">📄</span>
                                <div>
                                    <div class="file-name">${file.name}</div>
                                    <div class="file-size">${file.size}</div>
                                </div>
                            </div>
                            <div class="file-actions">
                                <a href="${file.path}" class="btn-download" download>⬇️ 下載</a>
                            </div>
                        </div>
                    `).join('');
                } else {
                    filesHTML = `
                        <div class="empty-message">
                            <div class="icon">📭</div>
                            <p>此區域尚無教材</p>
                        </div>
                    `;
                }
                
                categoriesHTML += `
                    <div class="category">
                        <h4>${catIcon} ${category}</h4>
                        <div class="file-list">${filesHTML}</div>
                    </div>
                `;
            }
            
            const section = `
                <div class="grade-section">
                    <div class="grade-header active" onclick="toggleGrade(this)">
                        <h3>${icons[gradeIndex]} ${grade} 數學</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="grade-content active">${categoriesHTML}</div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', section);
        }

        async function scanCategory(grade, category) {
            try {
                const response = await fetch(`materials/${grade}/${category}/`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const links = doc.querySelectorAll('a');
                const files = [];
                
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    const text = link.textContent.trim();
                    
                    if (text.endsWith('.pdf')) {
                        files.push({
                            name: text,
                            path: `materials/${grade}/${category}/${text}`,
                            size: 'PDF 檔案'
                        });
                    }
                });
                
                return files;
            } catch (error) {
                return [];
            }
        }

        function toggleGrade(header) {
            header.classList.toggle('active');
            header.nextElementSibling.classList.toggle('active');
        }

        function showStatus(message, type) {
            const container = document.getElementById('statusContainer');
            const status = document.createElement('div');
            status.className = `status-message status-${type}`;
            status.textContent = message;
            container.appendChild(status);
            setTimeout(() => status.remove(), 3000);
        }
    </script>
</body>
</html>
