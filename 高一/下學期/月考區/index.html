<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教材下載 | 數學教材中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: white; font-size: 2.2em; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.9); font-size: 1.1em; }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }
        .back-link:hover { background: rgba(255,255,255,0.3); }
        .breadcrumb { color: rgba(255,255,255,0.8); margin-bottom: 20px; }
        .file-grid { display: grid; gap: 15px; }
        .file-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            color: #333;
        }
        .file-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .file-icon { font-size: 2.5em; }
        .file-info { flex: 1; }
        .file-name { font-weight: bold; color: #333; margin-bottom: 5px; word-break: break-word; }
        .file-meta { font-size: 0.85em; color: #666; }
        .file-download {
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.95em;
        }
        footer { text-align: center; margin-top: 50px; color: rgba(255,255,255,0.6); }
        @media (max-width: 600px) {
            .file-card { flex-direction: column; text-align: center; }
            .file-download { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 練習區</h1>
            <p class="subtitle">點擊檔案即可下載</p>
        </header>
        <div class="breadcrumb"></div>
        <a href="../" class="back-link">← 返回上學期</a>
        <div class="file-grid">
            <!-- 請將下方的 example 替換為您的實際檔案 -->
            <!-- 範例： -->
            <!-- <a href="您的檔案名稱.pdf" class="file-card" download>
                <div class="file-icon">📝</div>
                <div class="file-info">
                    <div class="file-name">您的檔案名稱.pdf</div>
                    <div class="file-meta">2025/01/15</div>
                </div>
                <span class="file-download">⬇️ 下載</span>
            </a> -->
        </div>
        <footer><p>數學教材中心</p></footer>
    </div>
</body>
</html>
