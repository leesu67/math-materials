<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高一教材 | 數學教材中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { color: white; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 1.1em; }
        .back-link { color: white; text-decoration: none; margin-bottom: 30px; display: inline-block; padding: 10px 20px; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .back-link:hover { background: rgba(255,255,255,0.2); }
        .semester-section { margin-bottom: 30px; }
        .semester-title { color: #00d4ff; font-size: 1.5em; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid rgba(0,212,255,0.3); }
        .zone-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .zone-card { background: linear-gradient(145deg, #1e3a5f 0%, #0f2540 100%); border-radius: 12px; padding: 25px; text-align: center; text-decoration: none; color: white; transition: transform 0.3s; }
        .zone-card:hover { transform: translateY(-3px); }
        .zone-icon { font-size: 2.5em; margin-bottom: 10px; }
        .zone-name { font-size: 1.2em; font-weight: bold; }
        footer { text-align: center; margin-top: 40px; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 高一教材</h1>
            <p class="subtitle">選擇學期開始瀏覽</p>
        </header>
        <a href="../../" class="back-link">← 返回首頁</a>
        
        <!-- 上學期連結 -->
        <div class="semester-section">
            <h2 class="semester-title">📅 上學期</h2>
            <div class="zone-grid">
                <a href="上學期/練習區/index.html" class="zone-card">
                    <div class="zone-icon">📖</div>
                    <div class="zone-name">練習區</div>
                </a>
                <a href="上學期/月考區/index.html" class="zone-card">
                    <div class="zone-icon">📝</div>
                    <div class="zone-name">月考區</div>
                </a>
            </div>
        </div>
        
        <!-- 下學期連結 -->
        <div class="semester-section">
            <h2 class="semester-title">📅 下學期</h2>
            <div class="zone-grid">
                <a href="下學期/練習區/index.html" class="zone-card">
                    <div class="zone-icon">📖</div>
                    <div class="zone-name">練習區</div>
                </a>
                <a href="下學期/月考區/index.html" class="zone-card">
                    <div class="zone-icon">📝</div>
                    <div class="zone-name">月考區</div>
                </a>
            </div>
        </div>
        
        <footer><p>數學教材中心</p></footer>
    </div>
</body>
</html>
